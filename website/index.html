<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/>
  <title>Scrap Rover</title>
</head>
<body>
  <h2>Scrap Rover Live Feed</h2>
  <video id="stream" controls autoplay muted playsinline></video>
  <div class="controls-grid-container-row">
    <div>
      <button id="button_left">LEFT</button>
    </div>
    <div class="controls-grid-container-column">
      <button id="button_up">UP</button>
      <button id="button_down">DOWN</button>
    </div>
    <div>
      <button id="button_right">RIGHT</button>
    </div>
  </div>

  <script type="module" src="camera_controls.js"></script>
  <script src="webrtc_connection.js"></script>
  <script type="module" src="gamepad_controls.js"></script>

</body>
</html>
